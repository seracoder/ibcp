name: Publish to GitHub Packages

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Validate version matches tag
        run: |
          PROJECT_VERSION=$(grep '^version = "' pyproject.toml | sed 's/version = "//;s/"//')
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "pyproject.toml version: $PROJECT_VERSION"
          echo "Tag version: $TAG_VERSION"
          if [ "$PROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Version mismatch between pyproject.toml ($PROJECT_VERSION) and tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version validation passed"

      - name: Build release distributions
        run: |
          uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  github-packages-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish to GitHub Packages
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://pypi.pkg.github.com/seracoder
